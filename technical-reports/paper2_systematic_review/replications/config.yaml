project:
  name: Economic Narrative Index Replication Suite
  phase: 1-dictionary-foundation
  
data:
  raw_dir: ./data/raw
  processed_dir: ./data/processed
  cache_dir: ./data/cache

tetlock_2007:
  name: "Tetlock (2007): Giving Content to Investor Sentiment"
  method: dictionary_pca
  data_source: wsj_archive
  period: "1984-1999"
  target: stock_returns
  expected_rmse_improvement: 0.15-0.25
  
  preprocessing:
    lowercase: true
    remove_punctuation: true
    tokenize: whitespace
    
  feature_extraction:
    method: general_inquirer
    n_categories: 77
    pca_components: 1
    recentering: daily
    
  model:
    type: var_regression
    lags: 1
    
  validation:
    test_period: "1995-01-01:1999-09-17"
    baseline: ar1
    metric: rmse

gentzkow_2019:
  name: "Gentzkow, Shapiro & Taddy (2019): Policy Uncertainty"
  method: keyword_extraction_timeseries
  data_source: newspaper_archive
  period: "1985-2020"
  target: gdp_growth
  expected_rmse_improvement: 0.10-0.20
  
  keyword_categories:
    fiscal: [tax, spending, budget, deficit, revenue]
    monetary: [interest, fed, reserve, quantitative, taper]
    regulation: [regulation, compliance, legal, lawsuit, penalty]
    uncertainty: [uncertain, uncertain, unclear, ambiguous, unpredictable]
    
  preprocessing:
    lowercase: true
    remove_stopwords: true
    
  feature_extraction:
    method: keyword_count_normalized
    normalize: zscore_by_category
    
  model:
    type: timeseries_ar
    lags: 12
    
  validation:
    test_period: "2010-01-01:2020-12-31"
    baseline: ar12
    metric: rmse

evaluation:
  metrics:
    - rmse
    - mae
    - direction_accuracy
    - granger_causality
  
  baselines:
    - ar1
    - ar12
    - arima
    - professional_forecast
  
  test_protocol:
    realtime: true
    walkforward: true
    walkforward_window: 252
    
seeds:
  numpy: 42
  sklearn: 42
  torch: 42
